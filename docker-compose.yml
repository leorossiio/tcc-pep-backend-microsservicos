services:
  ms-medicos:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - APP_NAME=ms-medicos
    container_name: ms_medicos
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - POSTGRES_HOST=postgres-pep-ms
      - POSTGRES_PORT=5432
      - PORT_MEDICOS=3001
      - URL_AUDITORIA=http://ms_auditoria:3004/auditoria
    ports:
      - "3001:3001"
    depends_on:
      - postgres-pep-ms
    networks:
      - pep_network_ms
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  ms-pacientes:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - APP_NAME=ms-pacientes
    container_name: ms_pacientes
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - POSTGRES_HOST=postgres-pep-ms
      - POSTGRES_PORT=5432
      - PORT_PACIENTES=3002
      - URL_AUDITORIA=http://ms_auditoria:3004/auditoria
    ports:
      - "3002:3002"
    depends_on:
      - postgres-pep-ms
    networks:
      - pep_network_ms
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  ms-atendimentos:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - APP_NAME=ms-atendimentos
    container_name: ms_atendimentos
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - POSTGRES_HOST=postgres-pep-ms
      - POSTGRES_PORT=5432
      - PORT_ATENDIMENTOS=3003
      - URL_AUDITORIA=http://ms_auditoria:3004/auditoria
    ports:
      - "3003:3003"
    depends_on:
      - postgres-pep-ms
    networks:
      - pep_network_ms
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  ms-auditoria:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - APP_NAME=ms-auditoria
    container_name: ms_auditoria
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - POSTGRES_HOST=postgres-pep-ms
      - POSTGRES_PORT=5432
      - PORT_AUDITORIA=3004
    ports:
      - "3004:3004"
    depends_on:
      - postgres-pep-ms
    networks:
      - pep_network_ms
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  postgres-pep-ms:
    image: postgres:15-alpine
    container_name: db_postgres_pep_ms
    restart: always
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5433:5432" # Ajustado para não colidir com a porta 5432 do monolito
    volumes:
      - postgres_ms_data:/var/lib/postgresql/data
      - ./migration/postgres:/docker-entrypoint-initdb.d
    networks:
      - pep_network_ms
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_pep_ms
    restart: always
    ports:
      - "9091:9090" # Ajustado para não colidir com o 9090 do monolito
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-remote-write-receiver'
      - '--storage.tsdb.retention.time=7d'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_ms_data:/prometheus
    networks:
      - pep_network_ms

  grafana:
    image: grafana/grafana:latest
    container_name: grafana_pep_ms
    restart: always
    ports:
      - "3006:3000" # Ajustado para não colidir com o 3005 do monolito
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana_ms_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - pep_network_ms

  # Executar sob demanda (não sobe no `docker compose up` por causa do profile):
  #   docker compose run --rm -e SCENARIO=1 k6
  #   docker compose run --rm -e SCENARIO=2 k6
  #   docker compose run --rm -e SCENARIO=3 k6
  # SCENARIO: 1=Normal | 2=Dia Corrido | 3=Emergência
  # SYSTEM_TYPE: rótulo da arquitetura sob teste (default microsservicos)
  k6:
    image: grafana/k6:latest
    container_name: k6_pep_ms
    profiles: ["load-test"]
    environment:
      - K6_PROMETHEUS_RW_SERVER_URL=http://prometheus:9090/api/v1/write
      - K6_PROMETHEUS_RW_PUSH_INTERVAL=5s
      - K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM=false
      - SCENARIO=${SCENARIO:-1}
      - SYSTEM_TYPE=${SYSTEM_TYPE:-microsservicos}
    command: ["run", "-o", "experimental-prometheus-rw", "/scripts/cenario-emergencia-ms.js"]
    volumes:
      - ./k6-scripts:/scripts
    networks:
      - pep_network_ms
    depends_on:
      - ms-medicos
      - ms-pacientes
      - ms-atendimentos
      - ms-auditoria
      - prometheus

volumes:
  postgres_ms_data:
  prometheus_ms_data:
  grafana_ms_data:

networks:
  pep_network_ms:
    driver: bridge