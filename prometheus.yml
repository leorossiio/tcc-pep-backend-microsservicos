global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'ms-medicos'
    static_configs:
      - targets: ['ms-medicos:3001']
    metrics_path: /metrics

  - job_name: 'ms-pacientes'
    static_configs:
      - targets: ['ms-pacientes:3002']
    metrics_path: /metrics

  - job_name: 'ms-atendimentos'
    static_configs:
      - targets: ['ms-atendimentos:3003']
    metrics_path: /metrics

  - job_name: 'ms-auditoria'
    static_configs:
      - targets: ['ms-auditoria:3004']
    metrics_path: /metrics

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']